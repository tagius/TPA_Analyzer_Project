name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build macOS one-file executable
        if: runner.os == 'macOS'
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name tpa-analyzer --icon assets/tpa-analyzer-icon.icns --collect-submodules textual --collect-data textual app.py

      - name: Build Windows one-file executable
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m PyInstaller --noconfirm --clean --onefile --name tpa-analyzer --icon assets/tpa-analyzer-icon.ico --collect-submodules textual --collect-data textual app.py

      - name: Prepare macOS artifact
        if: runner.os == 'macOS'
        run: |
          APP_NAME="TPA Analyzer.app"
          APP_DIR="release/${APP_NAME}"

          mkdir -p "${APP_DIR}/Contents/MacOS"
          mkdir -p "${APP_DIR}/Contents/Resources"

          cp dist/tpa-analyzer "${APP_DIR}/Contents/MacOS/tpa-analyzer"
          chmod +x "${APP_DIR}/Contents/MacOS/tpa-analyzer"
          cp assets/tpa-analyzer-icon.icns "${APP_DIR}/Contents/Resources/AppIcon.icns"

          cat > "${APP_DIR}/Contents/MacOS/launcher" <<'SH'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          osascript -e "tell application \"Terminal\" to activate" -e "tell application \"Terminal\" to do script quoted form of POSIX path of \"$DIR/tpa-analyzer\""
          SH
          chmod +x "${APP_DIR}/Contents/MacOS/launcher"

          cat > "${APP_DIR}/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>TPA Analyzer</string>
            <key>CFBundleDisplayName</key>
            <string>TPA Analyzer</string>
            <key>CFBundleIdentifier</key>
            <string>com.tpa.analyzer</string>
            <key>CFBundleVersion</key>
            <string>1.0.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleExecutable</key>
            <string>launcher</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>LSMinimumSystemVersion</key>
            <string>11.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          ditto -c -k --sequesterRsrc --keepParent "${APP_DIR}" "release/tpa-analyzer-macos-app.zip"
          rm -rf "${APP_DIR}"

      - name: Prepare Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release -Force | Out-Null
          Copy-Item dist/tpa-analyzer.exe release/tpa-analyzer.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tpa-analyzer-${{ runner.os }}
          path: release/*
